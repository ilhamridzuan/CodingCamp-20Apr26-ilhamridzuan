<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Personal productivity dashboard with time tracking, focus timer, task management, and quick links">
    <title>Life Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Storage Warning Banner -->
    <div id="storage-warning-banner" class="storage-warning-banner" style="display: none;">
        <!-- Warning message will be inserted here by JavaScript -->
    </div>

    <main class="dashboard-container">
        <!-- Greeting Component -->
        <section id="greeting-container" class="greeting-component">
            <!-- GreetingComponent will render here -->
        </section>

        <!-- Timer Component -->
        <section id="timer-container" class="timer-component">
            <!-- TimerComponent will render here -->
        </section>

        <!-- Quick Links Component -->
        <section id="quick-links-container" class="quick-links-component">
            <!-- QuickLinksComponent will render here -->
        </section>

        <!-- Task List Component -->
        <section id="task-list-container" class="task-list-component">
            <!-- TaskListComponent will render here -->
        </section>

        <!-- Settings Component -->
        <section id="settings-container" class="settings-component">
            <!-- SettingsComponent will render here -->
        </section>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
